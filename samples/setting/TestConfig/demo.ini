; Sample test plan. Edit pressure/temp points and TaskScript to match real DUT.
; PressureType 支持：Gauge（表压）、Absolute（绝压）、Differential（差压）
; 方案级 PressureType 为所有压力点的默认类型；
; [PressurePointTypes] 可为单个压力点单独指定类型，覆盖方案默认值。

[Plan]
SensorType   = "M30-DEMO"
PressureUnit = "kPa"
Precision    = "0.05"
PressureType = "Gauge"
TaskScript   = "Initial:Pressure|Initial:Board|Initial:CommuTest|DAQ:ClearData|DAQ:TestType,测试|Read:Usource|Read:Isource|Read:Usign|Read:UT|TP:SetPressurePoint,1,TEST|Read:Usign|TP:SetPressurePoint,2,TEST|Read:Usign|TP:SetPressurePoint,3,TEST|Read:Usign|TP:Vent|Save:TestData|Cal:Test|DAQ:Down"

[TempPoints]
T1 = "25"

[PressurePoints]
P1 = "0"
P2 = "50"
P3 = "100"

; 可选：为单个压力点单独指定压力类型（不填则继承方案默认值 Gauge）
; 示例：P1 用表压，P2 用绝压，P3 用差压
; [PressurePointTypes]
; P1 = "Gauge"
; P2 = "Absolute"
; P3 = "Differential"
