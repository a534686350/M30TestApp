; M30TestApp.V2 station profile.
; Switch [DefaultLoadClass] entries between SIM (no hardware) and HW (real driver).
; Per-device sections supply the model name (must match Command.ini section) and address.

[DefaultLoadClass]
Pressure = "HW"
Oven     = "HW"
Dmm      = "HW"
Dac      = "HW"
Power    = "HW"
Board    = "HW"

[Device.Pressure]
Model    = "FLUKE-7250"
Address  = "GPIB1::10::INSTR"

[Device.Oven]
Model    = "GWSEBWT1670"
Address  = "COM5"
Baud     = "19200"
DataBits = "8"
Parity   = "None"
StopBits = "1"

[Device.Dmm]
Model    = "Keysight-34970A"
Address  = "GPIB1::9::INSTR"

[Device.Dac]
Model    = "M30-DAC"
Address  = "COM3"
Baud     = "9600"
DataBits = "8"
Parity   = "None"
StopBits = "1"

[Device.Power]
Model    = "ADCMT-6146"
Address  = "GPIB0::10::INSTR"

[Device.Board]
Model    = "Board"
Address  = "COM3"
Baud     = "9600"

[Slots]
; SIM 自动生成的工位数量，上限 256；若 工位对应表.csv 已有数据则忽略此项
Count        = "32"
SerialPrefix = "DEMO"
